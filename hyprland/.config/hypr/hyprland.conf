
################
### MONITORS ###
################

monitor=DP-1,3840x2160@60,2560x0,1.5
monitor=DP-2,3840x2160@164.99,0x0,1.5


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$menu = fuzzel


#################
### AUTOSTART ###
#################

exec-once = waybar


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __EGL_VENDOR_LIBRARY_FILENAMES,/usr/share/glvnd/egl_vendor.d/10_nvidia.json
env = LIBVA_DRIVER_NAME,nvidia

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 2
    gaps_out = 1
    border_size = 1

    resize_on_border = false
    allow_tearing = false

    layout = scrolling
}

decoration {
    rounding = 1

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

# Theme: symlink to gruvbox.conf or flatwhite.conf, switched by toggle-darkmode
source = ~/.config/hypr/theme.conf

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

################
### LAYOUTS ###
################

scrolling {
    column_width = 0.5
    fullscreen_on_one_column = true
    focus_fit_method = 1
    follow_focus = true
    follow_min_visible = 0.4
    explicit_column_widths = 0.333, 0.5, 0.667, 1.0
    direction = right
}

# Keep dwindle/master available for per-workspace layouts
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}


####################
### WORKSPACES ###
####################

workspace = 1, monitor:DP-2, fullscreen:0, name:browser, persistent:true
workspace = 2, monitor:DP-2, f[0], name:editor, persistent:true
workspace = 3, monitor:DP-2, name:term
workspace = 4, monitor:DP-1, name:termoff
workspace = 10, monitor:DP-1, f[0], border:false, rounding:false

# Steam games
windowrule = fullscreen on, match:class ^steam_app_\d+$
windowrule = monitor 1, match:class ^steam_app_\d+$
windowrule = workspace 10, match:class ^steam_app_\d+$


#############
### MISC ###
#############

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    enable_anr_dialog = false
}

ecosystem {
    no_donation_nag = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us,ru
    kb_options = grp:win_space_toggle

    follow_mouse = 1
    sensitivity = 0
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Core
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, R, exec, $menu
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod, S, exec, grim -g "$(slurp -d)" - | wl-copy
bind = $mainMod, N, exec, toggle-darkmode
bind = $mainMod, P, exec, sleep 1 && hyprctl dispatch dpms off
bind = $mainMod SHIFT, P, exec, hyprctl --batch "dispatch dpms on DP-1; dispatch dpms on DP-2"
bind = $mainMod SHIFT, E, exit,

# Vim-style focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Scroll layout: column resize
bind = $mainMod, D, layoutmsg, scrolling:colresize +conf
bind = $mainMod SHIFT, D, layoutmsg, scrolling:colresize -conf
bind = $mainMod, Minus, layoutmsg, scrolling:colresize -0.1
bind = $mainMod, Equal, layoutmsg, scrolling:colresize +0.1

# Scroll layout: center focused column
bind = $mainMod, T, layoutmsg, scrolling:center

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = no-focus-ghost
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}
